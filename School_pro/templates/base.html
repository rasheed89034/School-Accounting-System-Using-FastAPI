<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}School ERP{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; border-radius: 10px; }
        .table-responsive { background: white; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-mortarboard-fill text-warning me-2"></i>School ERP</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    
                    <!-- YAHAN CLASSES KA LINK ADD KIYA HAI -->
                    <li class="nav-item"><a class="nav-link" href="/classes-page"><i class="bi bi-journal-bookmark-fill"></i> Classes</a></li>
                    
                    <li class="nav-item"><a class="nav-link" href="/students-page"><i class="bi bi-people"></i> Students</a></li>
                    <li class="nav-item"><a class="nav-link" href="/receive-fee-page"><i class="bi bi-cash-coin"></i> Receive Fee</a></li>
                    <li class="nav-item"><a class="nav-link" href="/employees-page"><i class="bi bi-person-badge"></i> Staff/Teachers</a></li>
                    <li class="nav-item"><a class="nav-link" href="/expenses-page"><i class="bi bi-wallet2"></i> Expenses</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
